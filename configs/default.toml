[dataset]
provider_uri = "C:/Users/94875/.qlib/qlib_data/cn_data"
region = "cn"
market = "csi500"
benchmark = "SH000905"

[time_split]
train_start = "2015-01-01"
train_end = "2020-12-31"
valid_start = "2021-01-01"
valid_end = "2022-04-30"
test_start = "2022-05-01"
test_end = "2026-04-30"

[evaluation]
label_expression = "Ref($close, -2) / Ref($close, -1) - 1"
ic_method = "spearman"

[search]
seed_count = 10
target_valid_evaluations = 200
active_pool_size = 50
train_only = true
elite_archive_size = 20
max_active_lineage_ratio = 0.40
min_active_lineages_before_cap = 2
lineage_concentration_weight = 0.20
factor_prompt_length_limit = 40
factor_length_limit = 50
mutation_per_generation = 3
crossover_per_generation = 2
max_attempts_per_operator_slot = 5
max_seed_generation_attempts = 50
max_runtime_seconds = 28800
parent_train_ic_weight = 0.7
parent_validation_ic_weight = 0.3
parent_gap_penalty_weight = 0.2

[llm]
candidate_provider = "openai-compatible"
prior_provider = "openai-compatible"
max_tokens = 8000
temperature = 0.7

[selection]
final_top_k = 1
selection_metric = "validation_ic"

[backtest]
enabled = true
account = 100000000
topk = 50
n_drop = 5
risk_degree = 0.95

[prior_update]
improvement_abs_floor = 0.003
improvement_ratio = 0.30
degradation_abs_floor = 0.012
degradation_ratio = 0.60
trend_window = 5
trend_alpha = 0.3333333333333333
trend_epsilon = 0.001
