[dataset]
provider_uri = "C:/Users/94875/.qlib/qlib_data/cn_data"
region = "cn"
market = "csi500"
benchmark = "SH000905"

[time_split]
train_start = "2018-01-02"
train_end = "2018-06-30"
valid_start = "2018-07-01"
valid_end = "2018-12-31"
test_start = "2019-01-01"
test_end = "2019-12-31"

[evaluation]
label_expression = "Ref($close, -2) / Ref($close, -1) - 1"
ic_method = "spearman"

[search]
seed_count = 10
target_valid_evaluations = 200
active_pool_size = 50
factor_length_limit = 40
